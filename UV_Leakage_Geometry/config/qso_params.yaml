# UV Leakage Geometry — Project Parameters
# All tunable parameters live here. Notebooks must read from this file; do not hardcode.

crossmatch:
  radius_arcsec: 2.0          # matching radius applied to all catalogs
  min_catalog_matches: 3      # minimum distinct catalogs for a QSO to be retained

catalogs:
  - id: "II/389/ps1_dr2"      # PanSTARRS DR2
  - id: "II/319/las9"         # UKIDSS LAS
  - id: "II/319/dxs9"         # UKIDSS DXS
  - id: "II/319/gcs9"         # UKIDSS GCS
  - id: "II/311/wise"         # AllWISE
  - id: "II/335/galex_ais"    # GALEX AIS
  - id: "II/312/ais"          # GALEX AIS (alt)
  - id: "II/312/mis"          # GALEX MIS

band_wavelengths_AA:           # pivot wavelengths in Angstroms
  FUV:  1549
  NUV:  2303
  g:    4810
  r:    6170
  i:    7520
  z:    8660
  y:    9620
  Y:    10305
  J:    12483
  H:    16313
  K:    22010
  W1:   33680
  W2:   46180
  W3:   120820
  W4:   221940

vega_to_ab_offsets:            # add to Vega mag before flux conversion
  W1:  2.699
  W2:  3.339
  W3:  5.174
  W4:  6.620
  Y:   0.634
  J:   0.938
  H:   1.379
  K:   1.900

flux_outlier_thresholds_flam:  # FLAM values above these are set to NaN
  galex_panstarrs: 1.0e-11
  ukidss:          1.0e-10

uv_excess:
  ebv_min: 0.2                 # minimum E(B-V) to consider a QSO genuinely reddened
  target_sample_max: 100       # flag if clean UV-excess sample exceeds this

observing:                     # Lick Kast polarimetry planning (methodology: K. Leighly notes, 2026-07)
  # Workflow is MANUAL by design: the observer runs each target through the
  # web ETC (etc_page) by hand and saves the CSV download; scripts only
  # prepare the input sheet and post-process the downloaded files.
  etc_page: "https://etc.ucolick.org/web_s2n/kast"
  etc_settings:                # form settings — "leave all the defaults as is" per notes
    dichroic: "d55"
    slitwidth: "2.0 arcsec"
    binning: "1x1 pixels"
    grism: "600/4310"          # blue side
    grating: "600/7500"        # red side
    seeing: 1.5                # arcsec
    airmass: 1.1
    template: "flat"
    norm_filter: "g"           # normalize input mag in g (bluest optical band with full coverage)
    mag_system: "AB"
  etc_exptime_s: 900.0         # exposure time to TYPE into the ETC for every target (notes: >=100 s;
                               # exact value is arbitrary — results are rescaled analytically)
  etc_downloads_dir: "data/etc_downloads"  # save each target's ETC CSV here, named per the input sheet
  pol_flux_offset_mag: 0.752   # polarization optics pass half the flux: m_pol = m + 2.5*log10(2)
  pol_fractions: [0.01, 0.10]  # polarization fractions to be sensitive to; t_pol = t_normal / P
                                # (typical hoped-for range is 1-10%, not 1-4%)
  target_snr: 10.0             # required S/N before pol scaling — advisor: definitely >5, ideally >10
  snr_floor: 5.0               # hard minimum; exposure times reported at both values
  imaging_filter: "data/filters/PAN-STARRS_PS1.g.dat"  # filter profile integrated for imaging polarimetry
  spectropol_window_AA: [4000.0, 5500.0]  # window where per-pixel S/N requirement is evaluated (median)
  max_single_exptime_s: 1800.0 # split total integration into exposures no longer than this

